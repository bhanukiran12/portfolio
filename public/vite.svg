<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="BK">
  <defs>
    <linearGradient id="bk-neon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00FFFF"/>
      <stop offset="100%" stop-color="#8A2BE2"/>
    </linearGradient>
    <filter id="bk-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="64" height="64" rx="14" fill="#0a0a0f"/>
  <rect x="3" y="3" width="58" height="58" rx="11" fill="none" stroke="url(#bk-neon)" stroke-width="2" opacity="0.9"/>
  <text
    x="32"
    y="43"
    font-family="Inter, system-ui, Arial, sans-serif"
    font-size="26"
    font-weight="800"
    text-anchor="middle"
    fill="url(#bk-neon)"
    filter="url(#bk-glow)"
    letter-spacing="-1"
  >BK</text>
</svg>
